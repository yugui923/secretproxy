# Yuri devcontainer docker-compose.yml
# Last updated: 2026-02-19

# Used by VS Code Dev Containers extension

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    init: true
    shm_size: "4gb"
    hostname: "secretproxy"
    volumes:
      - ..:/workspace
      - claude-code-data:/home/vscode/.claude
    network_mode: host
    command: sleep infinity

volumes:
  claude-code-data:
    name: secretproxy-claude-code-data
