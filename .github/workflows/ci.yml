name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Third-party actions are pinned to commit SHA (per FIND-010 / supply
  # chain consistency); the trailing comment is the version label that
  # Dependabot updates on a real bump.
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: gofmt
        run: |
          # gofmt -l lists files that would be re-formatted; non-empty output
          # fails the gate. Same gofmt invocation pre-commit hooks use.
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found formatting issues:"
            gofmt -l .
            exit 1
          fi
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build -trimpath ./cmd/secret-proxy

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25.x"
          cache: true
      # FIND-017: scan stdlib + module deps against the Go vulnerability
      # database. Fails the build on any known CVE that the binary actually
      # reaches (govulncheck does call-graph analysis, not just version
      # match), so the noise floor is low.
      #
      # govulncheck is pinned to a tagged release; Go module proxy + checksum
      # DB then guarantees integrity.
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # gitleaks scans full history on push events
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25.x"
          cache: true
      # The repo is public and built around secret handling; CLAUDE.md
      # already mandates gitleaks pre-commit. CI re-runs it as a backstop
      # against bypassed hooks. Installing via `go install` pins to a tag
      # and uses the Go module proxy + checksum DB for integrity, same
      # contract as govulncheck above.
      # Module path is still github.com/zricethezav/gitleaks (the project
      # transferred to the gitleaks org but kept the canonical module path).
      - run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - run: gitleaks detect --source=. --no-banner --redact
